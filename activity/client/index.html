<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thcoku — Discord Activity</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2026.7.2/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2026.7.2/core.js"
    ></script>
  </head>
  <body>
    <div id="boot">
      <p id="boot-status">A ligar ao Discord…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>

    <main id="app" hidden>
      <div class="layout">
        <canvas id="canvas"></canvas>
        <aside id="sidebar" aria-label="Leaderboard">
          <div class="sidebar-head">
            <h2>Top XP</h2>
            <button type="button" id="lb-refresh">Atualizar</button>
          </div>
          <ol id="lb-list">A carregar…</ol>
          <p class="sidebar-note">XP partilhado com o bot · loja em /shop</p>
        </aside>
      </div>
      <div id="win-toast" hidden></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
