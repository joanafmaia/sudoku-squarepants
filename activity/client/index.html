<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thcoku — Discord Activity</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- Served via Render CDN proxy (/pyscript → pyscript.net). Vite must treat as external. -->
    <link
      rel="stylesheet"
      href="/pyscript/releases/2026.7.2/core.css"
    />
    <script
      type="module"
      src="/pyscript/releases/2026.7.2/core.js"
      data-external="true"
    ></script>
  </head>
  <body>
    <div id="boot">
      <p id="boot-status">A ligar ao Discord…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>

    <main id="app">
      <div class="layout">
        <div id="game-shell">
          <canvas id="canvas" width="720" height="980"></canvas>
          <p id="game-hint">A carregar o Sudoku (Pyodide)…</p>
        </div>
        <script
          type="py-game"
          src="/game/main.py"
          config="/game/pyscript.toml"
          target="canvas"
        ></script>
        <aside id="sidebar" aria-label="Leaderboard">
          <div class="sidebar-head">
            <h2>Top XP</h2>
            <button type="button" id="lb-refresh">Atualizar</button>
          </div>
          <ol id="lb-list">A carregar…</ol>
          <p class="sidebar-note">XP partilhado com o bot · loja em /shop</p>
        </aside>
      </div>
      <div id="win-toast" hidden></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
