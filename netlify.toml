# Netlify — Discord Activity (cliente Vite + Functions OAuth/Mongo)
[build]
  command = "npm install && npm install --prefix activity/client && npm run build --prefix activity/client"
  publish = "activity/client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# OAuth code → access_token
# Paths with /api/* (browser / root URL mapping) AND bare /* (Discord /api URL mapping strips the prefix)
[[redirects]]
  from = "/api/token"
  to = "/.netlify/functions/token"
  status = 200
  force = true

[[redirects]]
  from = "/token"
  to = "/.netlify/functions/token"
  status = 200
  force = true

# Shared Mongo leaderboard (same doc as the Fly.io bot)
[[redirects]]
  from = "/api/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200
  force = true

[[redirects]]
  from = "/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200
  force = true

# Activity solo win → XP / sponges in Mongo
[[redirects]]
  from = "/api/activity/win"
  to = "/.netlify/functions/activity-win"
  status = 200
  force = true

[[redirects]]
  from = "/activity/win"
  to = "/.netlify/functions/activity-win"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
