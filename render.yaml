# Bot + Discord Activity on one Render Web Service (Free + UptimeRobot → /health).
# Language/runtime: Docker (builds Vite Activity + runs Python bot).
services:
  - type: web
    name: sudoku-squarepants
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sudoku
      - key: DISCORD_GUILD_ID
        sync: false
      - key: VITE_DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: ACTIVITY_STATIC_DIR
        value: /app/activity_dist
